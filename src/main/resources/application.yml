spring:
  profiles:
    active: dev
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 200         # 최대 커넥션 수
      minimum-idle: 10               # 최소 유휴 커넥션 수
      idle-timeout: 30000            # 유휴 커넥션 유지 시간 (밀리초)
      max-lifetime: 1800000          # 커넥션 최대 수명 (밀리초)
      connection-timeout: 30000      # 커넥션 대기 시간 (밀리초)
      pool-name: HikariCP

  sql:
    init:
      mode: never
  r2dbc:
    url: r2dbc:mysql://partnerddb.creiqyoakhm2.ap-northeast-2.rds.amazonaws.com:3306/partnerd
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    pool:
      max-size: 50             # 최대 커넥션 수
      initial-size: 10         # 초기 커넥션 수
      max-idle-time: 30m  # 커넥션 유지 시간
      max-wait-time: 5s  # 커넥션 대기 시간
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        show_sql: true
        format_sql: true
        use_sql_comments: true
        hbm2ddl:
          auto: update
        default_batch_fetch_size: 1000
  kafka:
    bootstrap-servers: ${BOOTSTRAP_SERVER}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: ${GROUP_ID}
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.partnerd.service.kafkaService,java.util,java.lang"
    topic:
      chat: ${TOPIC_NAME}
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE}
    redis:
      host: localhost
      port: 6379
      password:            # Redis에 비밀번호 설정이 없다면 비워둠
      timeout: 5000        # 연결 타임아웃 (밀리초)
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
cloud:
  aws:
    s3:
      bucket: ${AWS_BUCKET:default}
      path:
        projects: projects
    region:
      static: ${AWS_REGION:default}
    stack:
      auto: false
    credentials:
      accessKey: ${AWS_ACCESS_KEY_ID:default}
      secretKey: ${AWS_SECRET_ACCESS_KEY:default}
    cloudfront:
      url: ${AWS_CLOUD_FRONT_DOMAIN:default}


security:
  oauth2:
    client:
      registration:
        kakao:
          client-authentication-method: client_secret_post
          client-id: ${KAKAO_CLIENT_ID}
          client-secret: ${KAKAO_CLIENT_SECRET}
          redirect-uri: ${KAKAO_REDIRECT_URI}
          authorization-grant-type: authorization_code
          scope: profile_nickname
          client-name: Kakao
      provider:
        kakao:
          authorization-uri: https://kauth.kakao.com/oauth/authorize
          token-uri: ${KAKAO_TOKEN_URI}
          user-info-uri: ${KAKAO_USER_INFO_URI}
          user-name-attribute: id
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  prometheus:
    metrics:
      export:
        enabled: true


logging:
  level:
    root: DEBUG
    org.hibernate.orm.jdbc.bind: DEBUG
    org.springframework.r2dbc: DEBUG
    org.springframework: DEBUG
    reactor: DEBUG
    io.r2dbc: DEBUG



