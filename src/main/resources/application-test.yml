spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    open-in-view: false
  r2dbc:
    url: r2dbc:h2:mem:///testdb
    username: sa
    password:

logging:
  level:
    root: DEBUG
    org.hibernate.orm.jdbc.bind: DEBUG
    org.springframework.r2dbc: DEBUG
    org.springframework: DEBUG
    reactor: DEBUG
    io.r2dbc: DEBUG
